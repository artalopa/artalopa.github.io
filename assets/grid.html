<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      @layer base;

      .grid {
        display: grid;
        grid-template: 1fr / 1fr 1fr 1fr;
        gap: 1rem;
        transition: grid-template 300ms 150ms;
      }

      .grid:has(:hover) {
        transition: grid-template 300ms;
      }

      .grid:has(> :nth-child(3n):hover) {
        grid-template: 1fr / 1fr 1fr 2fr;
      }

      .grid:has(> :nth-child(3n - 1):hover) {
        grid-template: 1fr / 1fr 2fr 1fr;
      }

      .grid:has(> :nth-child(3n - 2):hover) {
        grid-template: 1fr / 2fr 1fr 1fr;
      }

      .item:hover .caption {
        opacity: 1;
        transition: opacity 200ms 300ms;
      }

      .item:hover svg {
        transition: transform 200ms ease-out 300ms;
        transform: translate3d(0, 0, 0);
      }

      .item:hover img {
        opacity: 0.8;
      }

      @media screen and (orientation: portrait) {
        .grid {
          aspect-ratio: 9 / 16;
          grid-template: 1fr 1fr 1fr / 1fr;
        }

        .grid:has(> :nth-child(3n):hover) {
          grid-template: 1fr 1fr 2fr / 1fr;
        }

        .grid:has(> :nth-child(3n - 1):hover) {
          grid-template: 1fr 2fr 1fr / 1fr;
        }

        .grid:has(> :nth-child(3n - 2):hover) {
          grid-template: 2fr 1fr 1fr / 1fr;
        }
      }

      @layer base {
        * {
          box-sizing: border-box;
        }

        body {
          background-color: #000;
          margin: 0;
          padding: 1rem;
          display: grid;
          place-items: center;
          min-height: 100vh;
          font-family: "Open Sans", sans-serif;
        }

        img {
          width: 100%;
          display: block;
          position: absolute;
          height: 100%;
          object-fit: cover;
          filter: grayscale(100%);
          mix-blend-mode: multiply;
        }

        h3 {
          margin: 0;
        }

        .grid {
          display: grid;
          grid-template: 1fr / 1fr 1fr 1fr;
          gap: 5%;
          aspect-ratio: 16 / 9;
          max-width: 800px;
          width: 100%;
          transition: grid-template 300ms 120ms;
          border: 2px solid white;
          padding: 1rem;
        }

        .item {
          position: relative;
          background: var(--c, deeppink);
        }

        .item:nth-child(2n) {
          --c: turquoise;
        }

        .item:nth-child(3n) {
          --c: darkorchid;
        }

        .caption {
          position: relative;
          z-index: 1;
          color: white;
          padding: 1rem;
          opacity: 0;
          transition: opacity 120ms;
          display: flex;
          flex-direction: column;
          height: 100%;
        }

        svg {
          margin-top: auto;
          align-self: end;
          fill: currentColor;
          width: 2em;
          height: auto;
          transform: translate3d(-1em, 0, 0);
        }
      }

      button#toggleBtn {
        position: fixed;
        bottom: 20px;
        padding: 10px 20px;
        font-size: 14px;
        cursor: pointer;
        opacity: 0;
        transition: 200ms;
        background: transparent;
        border: 2px solid white;
      }

      button#toggleBtn:hover {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div class="item">
        <img src="grid/29.png" alt="" />
        <div class="caption">
          <h3>Pusing</h3>
          <svg viewBox="0 0 448 512" width="100" title="arrow-right">
            <path
              d="M190.5 66.9l22.2-22.2c9.4-9.4 24.6-9.4 33.9 0L441 239c9.4 9.4 9.4 24.6 0 33.9L246.6 467.3c-9.4 9.4-24.6 9.4-33.9 0l-22.2-22.2c-9.5-9.5-9.3-25 .4-34.3L311.4 296H24c-13.3 0-24-10.7-24-24v-32c0-13.3 10.7-24 24-24h287.4L190.9 101.2c-9.8-9.3-10-24.8-.4-34.3z"
            />
          </svg>
        </div>
      </div>
      <div class="item">
        <img src="grid/31.png" alt="" />
        <div class="caption">
          <h3>Kaget</h3>
          <svg viewBox="0 0 448 512" width="100" title="arrow-right">
            <path
              d="M190.5 66.9l22.2-22.2c9.4-9.4 24.6-9.4 33.9 0L441 239c9.4 9.4 9.4 24.6 0 33.9L246.6 467.3c-9.4 9.4-24.6 9.4-33.9 0l-22.2-22.2c-9.5-9.5-9.3-25 .4-34.3L311.4 296H24c-13.3 0-24-10.7-24-24v-32c0-13.3 10.7-24 24-24h287.4L190.9 101.2c-9.8-9.3-10-24.8-.4-34.3z"
            />
          </svg>
        </div>
      </div>
      <div class="item">
        <img src="grid/32.png" alt="" />
        <div class="caption">
          <h3>Bahagia</h3>
          <svg viewBox="0 0 448 512" width="100" title="arrow-right">
            <path
              d="M190.5 66.9l22.2-22.2c9.4-9.4 24.6-9.4 33.9 0L441 239c9.4 9.4 9.4 24.6 0 33.9L246.6 467.3c-9.4 9.4-24.6 9.4-33.9 0l-22.2-22.2c-9.5-9.5-9.3-25 .4-34.3L311.4 296H24c-13.3 0-24-10.7-24-24v-32c0-13.3 10.7-24 24-24h287.4L190.9 101.2c-9.8-9.3-10-24.8-.4-34.3z"
            />
          </svg>
        </div>
      </div>
    </div>

    <button id="toggleBtn">☀️/🌙</button>

    <script>
      const toggleBtn = document.getElementById("toggleBtn");
      const body = document.body;
      const grid = document.querySelector(".grid");

      // Ambil preference dari localStorage, default ke true (gelap)
      let isDark =
        localStorage.getItem("isDark") === null
          ? true
          : JSON.parse(localStorage.getItem("isDark"));

      // Terapkan background color berdasarkan preference saat halaman dimuat
      body.style.backgroundColor = isDark ? "#000" : "#fff";
      grid.style.borderColor = isDark ? "#fff" : "#000";
      toggleBtn.style.borderColor = isDark ? "#fff" : "#000";

      toggleBtn.addEventListener("click", () => {
        isDark = !isDark;
        body.style.backgroundColor = isDark ? "#000" : "#fff";
        grid.style.borderColor = isDark ? "#fff" : "#000";
        toggleBtn.style.borderColor = isDark ? "#fff" : "#000";
        // Simpan preference ke localStorage
        localStorage.setItem("isDark", JSON.stringify(isDark));
      });
    </script>
  </body>
</html>
